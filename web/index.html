<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <script>
    // Always start on splash so Firebase initializes before auth/dashboard routes.
    (function () {
      var hash = window.location.hash || '';
      if (hash !== '#/splash' && hash !== '') {
        window.location.replace(window.location.pathname + '#/splash');
      } else if (hash === '') {
        window.location.replace(window.location.pathname + '#/splash');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smart_khata_manager">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smart_khata_manager</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In (optional — popup fallback works without this) -->
  <!-- Copy Web client ID from Firebase Console → Authentication → Google → Web SDK -->
  <!-- <meta name="google-signin-client_id" content="YOUR_WEB_CLIENT_ID.apps.googleusercontent.com"> -->

  <!-- Firebase Phone Auth reCAPTCHA (web) -->
  <div id="recaptcha-container" style="display:flex;justify-content:center;margin:8px auto;"></div>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    #boot-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1565C0;
      gap: 16px;
    }
    #boot-loader p {
      margin: 0;
      color: #757575;
      font-size: 14px;
    }
  </style>

  <!-- Visible while Flutter downloads (prevents blank white screen) -->
  <div id="boot-loader">
    <strong>Smart Khata Manager</strong>
    <p>Loading app…</p>
  </div>

  <!-- Dev: log unexpected JS errors only (avoid noisy 404 spam in console) -->
  <script>
    window.addEventListener('error', function (event) {
      console.error('JavaScript Error Detected:', event.message, event.filename, event.lineno);
      var loader = document.getElementById('boot-loader');
      if (loader) {
        loader.innerHTML = '<strong>Load error</strong><p>' + event.message + '</p>';
      }
    });

    window.addEventListener('unhandledrejection', function (event) {
      console.error('Unhandled Promise Rejection:', event.reason);
    });

    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('boot-loader');
      if (loader) loader.remove();
    });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
